<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion EDT - IUT GIM Toulon</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react-router-dom@6/dist/umd/react-router-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toast {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .toast-exit {
            animation: slideOut 0.3s ease-in forwards;
        }
        @keyframes slideOut {
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        .type-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }
        .type-cm { @apply bg-blue-100 text-blue-800; }
        .type-td { @apply bg-green-100 text-green-800; }
        .type-tp { @apply bg-orange-100 text-orange-800; }
        .type-pt { @apply bg-purple-100 text-purple-800; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        const { BrowserRouter, HashRouter, Routes, Route, Link, useNavigate, useParams } = window.ReactRouterDOM;

        // API Service
        const api = {
            async request(endpoint, options = {}) {
                const url = `/api${endpoint}`;
                try {
                    const response = await fetch(url, {
                        headers: {
                            'Content-Type': 'application/json',
                            ...options.headers,
                        },
                        ...options,
                    });
                    if (!response.ok) {
                        throw new Error(`API Error: ${response.status}`);
                    }
                    return response.json();
                } catch (error) {
                    console.error('API request failed:', error);
                    throw error;
                }
            },
            
            teachers: {
                getAll: () => api.request('/teachers'),
                create: (data) => api.request('/teachers', { method: 'POST', body: JSON.stringify(data) }),
                update: (id, data) => api.request(`/teachers/${id}`, { method: 'PUT', body: JSON.stringify(data) }),
                delete: (id) => api.request(`/teachers/${id}`, { method: 'DELETE' }),
            },
            
            courses: {
                getAll: () => api.request('/courses'),
            },
            
            rooms: {
                getAll: () => api.request('/rooms'),
                create: (data) => api.request('/rooms', { method: 'POST', body: JSON.stringify(data) }),
                update: (id, data) => api.request(`/rooms/${id}`, { method: 'PUT', body: JSON.stringify(data) }),
                delete: (id) => api.request(`/rooms/${id}`, { method: 'DELETE' }),
            },
            
            sessions: {
                getAll: () => api.request('/course-sessions'),
                getWeeklyHours: (sessionId) => api.request(`/weekly-hours/${sessionId}`),
            },
            
            service: {
                getAll: () => api.request('/service/all'),
            },
            
            timetable: {
                getWeek: (week) => api.request(`/timetable/week/${week}`),
            },
        };

        // Toast Component
        function Toast({ message, type = 'success' }) {
            const [isExiting, setIsExiting] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => setIsExiting(true), 3000);
                return () => clearTimeout(timer);
            }, []);

            const bgColor = type === 'error' ? 'bg-red-500' : 'bg-green-500';
            const className = `toast ${isExiting ? 'toast-exit' : ''} fixed top-4 right-4 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg z-50`;

            return <div className={className}>{message}</div>;
        }

        // Toast Manager
        function useToast() {
            const [toasts, setToasts] = useState([]);

            const add = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3500);
            };

            return { toasts, add };
        }

        // Reusable Components
        function Modal({ isOpen, onClose, title, children }) {
            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40" onClick={onClose}>
                    <div className="bg-white rounded-lg shadow-xl max-w-md w-full mx-4" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center border-b px-6 py-4">
                            <h2 className="text-xl font-bold text-gray-900">{title}</h2>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                        <div className="px-6 py-4">
                            {children}
                        </div>
                    </div>
                </div>
            );
        }

        function Button({ children, variant = 'primary', size = 'md', onClick, disabled = false, className = '' }) {
            const baseStyle = 'font-semibold rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2';
            const sizeStyle = size === 'sm' ? 'px-3 py-1 text-sm' : size === 'lg' ? 'px-6 py-3 text-lg' : 'px-4 py-2';
            
            let colorStyle = '';
            if (variant === 'primary') {
                colorStyle = 'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500 disabled:bg-indigo-300';
            } else if (variant === 'secondary') {
                colorStyle = 'bg-gray-200 text-gray-900 hover:bg-gray-300 focus:ring-gray-400 disabled:bg-gray-100';
            } else if (variant === 'danger') {
                colorStyle = 'bg-red-600 text-white hover:bg-red-700 focus:ring-red-500 disabled:bg-red-300';
            } else if (variant === 'success') {
                colorStyle = 'bg-green-600 text-white hover:bg-green-700 focus:ring-green-500 disabled:bg-green-300';
            }

            return (
                <button 
                    onClick={onClick} 
                    disabled={disabled}
                    className={`${baseStyle} ${sizeStyle} ${colorStyle} ${className}`}
                >
                    {children}
                </button>
            );
        }

        function Card({ title, value, icon: Icon }) {
            return (
                <div className="bg-white rounded-lg shadow p-6 border-l-4 border-indigo-600">
                    <div className="flex items-center justify-between">
                        <div>
                            <p className="text-gray-600 text-sm font-medium">{title}</p>
                            <p className="text-3xl font-bold text-gray-900 mt-2">{value}</p>
                        </div>
                        {Icon && <Icon className="w-12 h-12 text-indigo-600 opacity-20" />}
                    </div>
                </div>
            );
        }

        // Dashboard Page
        function Dashboard() {
            const [stats, setStats] = useState({ teachers: 0, courses: 0, rooms: 0, sessions: 0 });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadStats = async () => {
                    try {
                        const [teachers, courses, rooms, sessions] = await Promise.all([
                            api.teachers.getAll(),
                            api.courses.getAll(),
                            api.rooms.getAll(),
                            api.sessions.getAll(),
                        ]);
                        setStats({
                            teachers: teachers.length,
                            courses: courses.length,
                            rooms: rooms.length,
                            sessions: sessions.length,
                        });
                    } catch (error) {
                        console.error('Failed to load stats:', error);
                    } finally {
                        setLoading(false);
                    }
                };
                loadStats();
            }, []);

            return (
                <div className="space-y-8">
                    <div>
                        <h1 className="text-4xl font-bold text-gray-900">Gestion EDT - IUT GIM Toulon</h1>
                        <p className="text-gray-600 mt-2">Système de gestion de l'emploi du temps</p>
                    </div>

                    {loading ? (
                        <div className="flex justify-center items-center h-40">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            <Card title="Enseignants" value={stats.teachers} />
                            <Card title="Matières" value={stats.courses} />
                            <Card title="Salles" value={stats.rooms} />
                            <Card title="Sessions" value={stats.sessions} />
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <Link to="/enseignants" className="block p-6 bg-indigo-50 rounded-lg hover:shadow-lg transition">
                            <h3 className="text-xl font-bold text-indigo-900">Enseignants</h3>
                            <p className="text-indigo-700 mt-2">Gérer les enseignants et leurs coordonnées</p>
                        </Link>
                        <Link to="/matieres" className="block p-6 bg-blue-50 rounded-lg hover:shadow-lg transition">
                            <h3 className="text-xl font-bold text-blue-900">Matières</h3>
                            <p className="text-blue-700 mt-2">Consulter les matières et formations</p>
                        </Link>
                        <Link to="/salles" className="block p-6 bg-green-50 rounded-lg hover:shadow-lg transition">
                            <h3 className="text-xl font-bold text-green-900">Salles</h3>
                            <p className="text-green-700 mt-2">Gérer les salles disponibles</p>
                        </Link>
                        <Link to="/sessions" className="block p-6 bg-purple-50 rounded-lg hover:shadow-lg transition">
                            <h3 className="text-xl font-bold text-purple-900">Sessions de cours</h3>
                            <p className="text-purple-700 mt-2">Gérer les sessions de cours</p>
                        </Link>
                        <Link to="/repartition" className="block p-6 bg-orange-50 rounded-lg hover:shadow-lg transition">
                            <h3 className="text-xl font-bold text-orange-900">Répartition hebdomadaire</h3>
                            <p className="text-orange-700 mt-2">Voir la répartition horaire</p>
                        </Link>
                        <Link to="/service" className="block p-6 bg-red-50 rounded-lg hover:shadow-lg transition">
                            <h3 className="text-xl font-bold text-red-900">Service enseignants</h3>
                            <p className="text-red-700 mt-2">Consulter les services HETD</p>
                        </Link>
                        <Link to="/edt" className="block p-6 bg-cyan-50 rounded-lg hover:shadow-lg transition md:col-span-2">
                            <h3 className="text-xl font-bold text-cyan-900">Emploi du temps</h3>
                            <p className="text-cyan-700 mt-2">Consulter l'emploi du temps hebdomadaire</p>
                        </Link>
                    </div>
                </div>
            );
        }

        // Enseignants Page
        function Enseignants() {
            const { toasts, add: addToast } = useToast();
            const [teachers, setTeachers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                phone: '',
                structure: '',
                corps: '',
            });

            useEffect(() => {
                loadTeachers();
            }, []);

            const loadTeachers = async () => {
                try {
                    setLoading(true);
                    const data = await api.teachers.getAll();
                    setTeachers(data);
                } catch (error) {
                    addToast('Erreur lors du chargement des enseignants', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleOpenModal = (teacher = null) => {
                if (teacher) {
                    setEditingId(teacher.id);
                    setFormData(teacher);
                } else {
                    setEditingId(null);
                    setFormData({
                        name: '',
                        email: '',
                        phone: '',
                        structure: '',
                        corps: '',
                    });
                }
                setIsModalOpen(true);
            };

            const handleCloseModal = () => {
                setIsModalOpen(false);
                setEditingId(null);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    if (editingId) {
                        await api.teachers.update(editingId, formData);
                        addToast('Enseignant modifié avec succès');
                    } else {
                        await api.teachers.create(formData);
                        addToast('Enseignant ajouté avec succès');
                    }
                    handleCloseModal();
                    loadTeachers();
                } catch (error) {
                    addToast('Erreur lors de l\'enregistrement', 'error');
                }
            };

            const handleDelete = async (id) => {
                if (confirm('Êtes-vous sûr de vouloir supprimer cet enseignant ?')) {
                    try {
                        await api.teachers.delete(id);
                        addToast('Enseignant supprimé avec succès');
                        loadTeachers();
                    } catch (error) {
                        addToast('Erreur lors de la suppression', 'error');
                    }
                }
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-3xl font-bold text-gray-900">Enseignants</h1>
                        <Button onClick={() => handleOpenModal()} variant="primary">
                            + Ajouter un enseignant
                        </Button>
                    </div>

                    {loading ? (
                        <div className="flex justify-center items-center h-40">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                        </div>
                    ) : (
                        <div className="bg-white rounded-lg shadow overflow-hidden">
                            <table className="w-full">
                                <thead className="bg-gray-50 border-b">
                                    <tr>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Nom</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Email</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Téléphone</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Structure</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Corps</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {teachers.map(teacher => (
                                        <tr key={teacher.id} className="hover:bg-gray-50">
                                            <td className="px-6 py-4 text-sm font-medium text-gray-900">{teacher.name}</td>
                                            <td className="px-6 py-4 text-sm text-gray-600">{teacher.email}</td>
                                            <td className="px-6 py-4 text-sm text-gray-600">{teacher.phone}</td>
                                            <td className="px-6 py-4 text-sm text-gray-600">{teacher.structure}</td>
                                            <td className="px-6 py-4 text-sm text-gray-600">{teacher.corps}</td>
                                            <td className="px-6 py-4 text-sm space-x-2">
                                                <Button 
                                                    size="sm" 
                                                    variant="secondary"
                                                    onClick={() => handleOpenModal(teacher)}
                                                >
                                                    Éditer
                                                </Button>
                                                <Button 
                                                    size="sm" 
                                                    variant="danger"
                                                    onClick={() => handleDelete(teacher.id)}
                                                >
                                                    Supprimer
                                                </Button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {teachers.length === 0 && (
                                <div className="text-center py-8 text-gray-500">
                                    Aucun enseignant trouvé
                                </div>
                            )}
                        </div>
                    )}

                    <Modal isOpen={isModalOpen} onClose={handleCloseModal} title={editingId ? 'Modifier l\'enseignant' : 'Ajouter un enseignant'}>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Nom</label>
                                <input
                                    type="text"
                                    value={formData.name}
                                    onChange={e => setFormData({...formData, name: e.target.value})}
                                    className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border px-3 py-2"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Email</label>
                                <input
                                    type="email"
                                    value={formData.email}
                                    onChange={e => setFormData({...formData, email: e.target.value})}
                                    className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border px-3 py-2"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Téléphone</label>
                                <input
                                    type="tel"
                                    value={formData.phone}
                                    onChange={e => setFormData({...formData, phone: e.target.value})}
                                    className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border px-3 py-2"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Structure</label>
                                <input
                                    type="text"
                                    value={formData.structure}
                                    onChange={e => setFormData({...formData, structure: e.target.value})}
                                    className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border px-3 py-2"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Corps</label>
                                <input
                                    type="text"
                                    value={formData.corps}
                                    onChange={e => setFormData({...formData, corps: e.target.value})}
                                    className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border px-3 py-2"
                                />
                            </div>
                            <div className="flex justify-end gap-3 pt-4">
                                <Button variant="secondary" onClick={handleCloseModal}>Annuler</Button>
                                <Button variant="primary" type="submit">Enregistrer</Button>
                            </div>
                        </form>
                    </Modal>

                    {toasts.map(toast => (
                        <Toast key={toast.id} message={toast.message} type={toast.type} />
                    ))}
                </div>
            );
        }

        // Matières Page
        function Matieres() {
            const { toasts, add: addToast } = useToast();
            const [courses, setCourses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedSemester, setSelectedSemester] = useState('');
            const semesters = ['S1', 'S2', 'S3', 'S4', 'S5', 'S6'];

            useEffect(() => {
                loadCourses();
            }, []);

            const loadCourses = async () => {
                try {
                    setLoading(true);
                    const data = await api.courses.getAll();
                    setCourses(data);
                } catch (error) {
                    addToast('Erreur lors du chargement des matières', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const filteredCourses = selectedSemester 
                ? courses.filter(c => c.semester === selectedSemester)
                : courses;

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-3xl font-bold text-gray-900">Matières</h1>
                    </div>

                    <div className="bg-white rounded-lg shadow p-4">
                        <label className="block text-sm font-medium text-gray-700 mb-2">Filtrer par semestre</label>
                        <select
                            value={selectedSemester}
                            onChange={e => setSelectedSemester(e.target.value)}
                            className="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border px-3 py-2"
                        >
                            <option value="">Tous les semestres</option>
                            {semesters.map(s => (
                                <option key={s} value={s}>{s}</option>
                            ))}
                        </select>
                    </div>

                    {loading ? (
                        <div className="flex justify-center items-center h-40">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                        </div>
                    ) : (
                        <div className="bg-white rounded-lg shadow overflow-hidden">
                            <table className="w-full">
                                <thead className="bg-gray-50 border-b">
                                    <tr>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Code</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Nom</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Semestre</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Type</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Sessions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {filteredCourses.map(course => (
                                        <tr key={course.id} className="hover:bg-gray-50">
                                            <td className="px-6 py-4 text-sm font-medium text-gray-900">{course.code}</td>
                                            <td className="px-6 py-4 text-sm text-gray-600">{course.name}</td>
                                            <td className="px-6 py-4 text-sm text-gray-600">{course.semester}</td>
                                            <td className="px-6 py-4 text-sm">
                                                <span className={`type-badge type-${course.type?.toLowerCase() || 'cm'}`}>
                                                    {course.type || 'N/A'}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4 text-sm text-gray-600">{course.session_count || 0}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {filteredCourses.length === 0 && (
                                <div className="text-center py-8 text-gray-500">
                                    Aucune matière trouvée
                                </div>
                            )}
                        </div>
                    )}

                    {toasts.map(toast => (
                        <Toast key={toast.id} message={toast.message} type={toast.type} />
                    ))}
                </div>
            );
        }

        // Salles Page
        function Salles() {
            const { toasts, add: addToast } = useToast();
            const [rooms, setRooms] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                name: '',
                type: '',
                capacity: '',
            });

            useEffect(() => {
                loadRooms();
            }, []);

            const loadRooms = async () => {
                try {
                    setLoading(true);
                    const data = await api.rooms.getAll();
                    setRooms(data);
                } catch (error) {
                    addToast('Erreur lors du chargement des salles', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleOpenModal = (room = null) => {
                if (room) {
                    setEditingId(room.id);
                    setFormData(room);
                } else {
                    setEditingId(null);
                    setFormData({
                        name: '',
                        type: '',
                        capacity: '',
                    });
                }
                setIsModalOpen(true);
            };

            const handleCloseModal = () => {
                setIsModalOpen(false);
                setEditingId(null);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    if (editingId) {
                        await api.rooms.update(editingId, formData);
                        addToast('Salle modifiée avec succès');
                    } else {
                        await api.rooms.create(formData);
                        addToast('Salle ajoutée avec succès');
                    }
                    handleCloseModal();
                    loadRooms();
                } catch (error) {
                    addToast('Erreur lors de l\'enregistrement', 'error');
                }
            };

        // Répartition hebdomadaire Page
        function Repartition() {
            const { toasts, add: addToast } = useToast();
            const [sessions, setSessions] = useState([]);
            const [weeklyData, setWeeklyData] = useState({});
            const [loading, setLoading] = useState(true);
            const [selectedSemester, setSelectedSemester] = useState('');
            const semesters = ['S1', 'S2', 'S3', 'S4', 'S5', 'S6'];

            useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                try {
                    setLoading(true);
                    const sessionsData = await api.sessions.getAll();
                    setSessions(sessionsData);
                    
                    // Load weekly hours for each session
                    const weeklyHours = {};
                    for (const session of sessionsData) {
                        try {
                            weeklyHours[session.id] = await api.sessions.getWeeklyHours(session.id);
                        } catch (error) {
                            weeklyHours[session.id] = {};
                        }
                    }
                    setWeeklyData(weeklyHours);
                } catch (error) {
                    addToast('Erreur lors du chargement', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const filteredSessions = selectedSemester
                ? sessions.filter(s => s.semester === selectedSemester)
                : sessions;

            // Get all weeks from the data
            const allWeeks = new Set();
            Object.values(weeklyData).forEach(data => {
                Object.keys(data).forEach(week => allWeeks.add(week));
            });
            const weeks = Array.from(allWeeks).sort();

            // Calculate totals by type
            const calculateWeeklyTotal = (week, type) => {
                let total = 0;
                filteredSessions.forEach(session => {
                    if (session.formation === type && weeklyData[session.id]) {
                        const hours = weeklyData[session.id][week] || 0;
                        total += hours;
                    }
                });
                return total;
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-3xl font-bold text-gray-900">Répartition hebdomadaire</h1>
                    </div>

                    <div className="bg-white rounded-lg shadow p-4">
                        <label className="block text-sm font-medium text-gray-700 mb-2">Filtrer par semestre</label>
                        <select
                            value={selectedSemester}
                            onChange={e => setSelectedSemester(e.target.value)}
                            className="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border px-3 py-2"
                        >
                            <option value="">Tous les semestres</option>
                            {semesters.map(s => (
                                <option key={s} value={s}>{s}</option>
                            ))}
                        </select>
                    </div>

                    {loading ? (
                        <div className="flex justify-center items-center h-40">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                        </div>
                    ) : (
                        <div className="space-y-8">
                            {filteredSessions.length === 0 ? (
                                <div className="bg-white rounded-lg shadow p-8 text-center text-gray-500">
                                    Aucune session trouvée
                                </div>
                            ) : (
                                <div className="bg-white rounded-lg shadow overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead className="bg-gray-50 border-b">
                                            <tr>
                                                <th className="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Session</th>
                                                {weeks.map(week => (
                                                    <th key={week} className="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase">
                                                        {week}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {filteredSessions.map(session => (
                                                <tr key={session.id} className="hover:bg-gray-50">
                                                    <td className="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">
                                                        <div className="text-sm">{session.course_code}</div>
                                                        <div className="text-xs text-gray-600">{session.formation}</div>
                                                    </td>
                                                    {weeks.map(week => {
                                                        const hours = weeklyData[session.id]?.[week] || 0;
                                                        const isOverLimit = (session.formation === 'ALT' && hours > 40) || 
                                                                          (session.formation === 'FTP' && hours > 30);
                                                        return (
                                                            <td 
                                                                key={week}
                                                                className={`px-4 py-4 text-center ${isOverLimit ? 'bg-red-100 text-red-900' : ''}`}
                                                            >
                                                                {hours}h
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                        <tfoot className="bg-gray-50 border-t-2">
                                            <tr>
                                                <td className="px-6 py-3 font-bold text-gray-900">FTP Total</td>
                                                {weeks.map(week => (
                                                    <td key={`ftp-${week}`} className="px-4 py-3 text-center font-bold">
                                                        {calculateWeeklyTotal(week, 'FTP')}h
                                                    </td>
                                                ))}
                                            </tr>
                                            <tr>
                                                <td className="px-6 py-3 font-bold text-gray-900">ALT Total</td>
                                                {weeks.map(week => {
                                                    const total = calculateWeeklyTotal(week, 'ALT');
                                                    return (
                                                        <td 
                                                            key={`alt-${week}`} 
                                                            className={`px-4 py-3 text-center font-bold ${total > 40 ? 'bg-red-100 text-red-900' : ''}`}
                                                        >
                                                            {total}h
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                            )}
                        </div>
                    )}

                    {toasts.map(toast => (
                        <Toast key={toast.id} message={toast.message} type={toast.type} />
                    ))}
                </div>
            );
        }

                                <select
                                    value={selectedWeek}
                                    onChange={e => setSelectedWeek(e.target.value)}
                                    className="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border px-3 py-2 w-full"
                                >
                                    {weeks.map(week => (
                                        <option key={week} value={week}>{week}</option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Affichage</label>
                                <select
                                    value={viewMode}
                                    onChange={e => setViewMode(e.target.value)}
                                    className="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border px-3 py-2 w-full"
                                >
                                    <option value="class">Par classe</option>
                                    <option value="teacher">Par enseignant</option>
                                    <option value="room">Par salle</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    {loading ? (
                        <div className="flex justify-center items-center h-40">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                        </div>
                    ) : (
                        <div className="bg-white rounded-lg shadow overflow-x-auto">
                            <table className="w-full border-collapse text-sm">
                                <thead>
                                    <tr className="border-b">
                                        <th className="px-4 py-3 text-left font-bold bg-gray-50 border-r">Heure</th>
                                        {days.map(day => (
                                            <th key={day} className="px-4 py-3 text-center font-bold bg-indigo-50 border-r">
                                                {day}
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {timeSlots.map((slot, slotIdx) => (
                                        <tr key={slot} className="border-b">
                                            <td className="px-4 py-3 font-medium bg-gray-50 border-r whitespace-nowrap">
                                                {slot}
                                            </td>
                                            {days.map((day, dayIdx) => {
                                                const cellKey = `${day}-${slot}`;
                                                const event = timetableData[cellKey];
                                                return (
                                                    <td 
                                                        key={cellKey}
                                                        className={`px-4 py-3 border-r text-xs ${event ? getTypeColor(event.type) : 'bg-white'}`}
                                                    >
                                                        {event && (
                                                            <div className={getTypeTextColor(event.type)}>
                                                                <div className="font-bold">{event.code}</div>
                                                                <div>{event.teacher}</div>
                                                                <div>{event.room}</div>
                                                                <div className="font-semibold">{event.type}</div>
                                                            </div>
                                                        )}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                        <div className="flex items-center gap-2">
                            <div className="w-4 h-4 bg-blue-100 border-2 border-blue-500"></div>
                            <span>CM</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="w-4 h-4 bg-green-100 border-2 border-green-500"></div>
                            <span>TD</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="w-4 h-4 bg-orange-100 border-2 border-orange-500"></div>
                            <span>TP</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="w-4 h-4 bg-purple-100 border-2 border-purple-500"></div>
                            <span>PT</span>
                        </div>
                    </div>

                    {toasts.map(toast => (
                        <Toast key={toast.id} message={toast.message} type={toast.type} />
                    ))}
                </div>
            );
        }

        // Navigation Header
        function Navigation() {
            return (
                <nav className="bg-white shadow-md border-b-4 border-indigo-600">
                    <div className="max-w-7xl mx-auto px-4 py-4">
                        <div className="flex justify-between items-center mb-4">
                            <Link to="/" className="text-2xl font-bold text-indigo-600">
                                EDT Manager
                            </Link>
                        </div>
                        <div className="flex gap-2 flex-wrap">
                            <Link to="/" className="px-4 py-2 rounded-lg hover:bg-indigo-50 text-indigo-600 font-medium transition">
                                Tableau de bord
                            </Link>
                            <Link to="/enseignants" className="px-4 py-2 rounded-lg hover:bg-indigo-50 text-indigo-600 font-medium transition">
                                Enseignants
                            </Link>
                            <Link to="/matieres" className="px-4 py-2 rounded-lg hover:bg-indigo-50 text-indigo-600 font-medium transition">
                                Matières
                            </Link>
                            <Link to="/salles" className="px-4 py-2 rounded-lg hover:bg-indigo-50 text-indigo-600 font-medium transition">
                                Salles
                            </Link>
                            <Link to="/sessions" className="px-4 py-2 rounded-lg hover:bg-indigo-50 text-indigo-600 font-medium transition">
                                Sessions
                            </Link>
                            <Link to="/repartition" className="px-4 py-2 rounded-lg hover:bg-indigo-50 text-indigo-600 font-medium transition">
                                Répartition
                            </Link>
                            <Link to="/service" className="px-4 py-2 rounded-lg hover:bg-indigo-50 text-indigo-600 font-medium transition">
                                Service
                            </Link>
                            <Link to="/edt" className="px-4 py-2 rounded-lg hover:bg-indigo-50 text-indigo-600 font-medium transition">
                                EDT
                            </Link>
                        </div>
                    </div>
                </nav>
            );
        }

        // Main App Component
        function App() {
            return (
                <HashRouter>
                    <div className="min-h-screen bg-gray-100">
                        <Navigation />
                        <main className="max-w-7xl mx-auto px-4 py-8">
                            <Routes>
                                <Route path="/" element={<Dashboard />} />
                                <Route path="/enseignants" element={<Enseignants />} />
                                <Route path="/matieres" element={<Matieres />} />
                                <Route path="/salles" element={<Salles />} />
                                <Route path="/sessions" element={<Sessions />} />
                                <Route path="/repartition" element={<Repartition />} />
                                <Route path="/service" element={<Service />} />
                                <Route path="/edt" element={<EDT />} />
                            </Routes>
                        </main>
                    </div>
                </HashRouter>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
